
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard</title>

    <!-- External Libraries for SockJS and STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Internal CSS for styling -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        #notifications {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #notifications li {
            background-color: #fff;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        #notifications li:hover {
            background-color: #ecf0f1;
            transform: scale(1.05);
        }

        .notification-header {
            font-weight: bold;
            color: #34495e;
        }

        .notification-body {
            font-size: 16px;
            color: #7f8c8d;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Employer Dashboard</h1>
</header>

<div style="padding: 20px;">
    <h2>Job Notifications</h2>
    <ul id="notifications"></ul>
</div>

<footer>
    <p>&copy; 2025 Job Portal. All rights reserved.</p>
</footer>

<script>
    var socket = new SockJS('http://localhost:8080/ws');
    var stompClient = Stomp.over(socket);

    stompClient.connect({}, function (frame) {
        console.log("Connected: " + frame);
        stompClient.subscribe('/topic/job-notifications', function (notification) {
            var msg = notification.body;

            // Create a list item with notification
            var li = document.createElement("li");

            // Add Notification content
            var header = document.createElement("div");
            header.classList.add("notification-header");
            header.textContent = "New Job Notification";

            var body = document.createElement("div");
            body.classList.add("notification-body");
            body.textContent = msg;

            li.appendChild(header);
            li.appendChild(body);

            // Append the list item to the notifications list
            document.getElementById("notifications").appendChild(li);
        });
    });
</script>

</body>

</html>
